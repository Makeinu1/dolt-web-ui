# Dolt Web UI Configuration
# Copy this file to config.yaml and update the values for your environment.

# Dolt SQL Server targets
targets:
  - id: lab
    host: "192.168.x.x"
    port: 3306
    user: "root"
    password: ""

# Allowed databases per target
databases:
  - target_id: lab
    name: your_database
    allowed_branches:
      - "main"
      - "audit"
      - "wi/*"

# Web server settings
server:
  port: 8080
  # Set to "*" or specific origin for CORS (e.g., "http://localhost:5173" for dev)
  cors_origin: "*"
  body_limit_mb: 10
  timeouts:
    read_sec: 30
    write_sec: 300
    idle_sec: 120
  recovery:
    branch_ready_sec: 10
    branch_ready_poll_ms: 500
  retries:
    tag_retry_attempts: 3
    tag_retry_delay_ms: 500
  search:
    timeout_sec: 5
  pool:
    max_open: 20
    max_idle: 10
    conn_lifetime_sec: 3600
