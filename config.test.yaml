targets:
  - id: local
    host: "127.0.0.1"
    port: 13306
    user: "root"
    password: ""

databases:
  - target_id: local
    name: test_db
    allowed_branches:
      - "main"
      - "audit"
      - "wi/*"
  - target_id: local
    name: dest_db
    allowed_branches:
      - "main"
      - "audit"
      - "wi/*"

server:
  port: 18080
  cors_origin: "http://127.0.0.1:4173"
  body_limit_mb: 10
  timeouts:
    read_sec: 30
    write_sec: 300
    idle_sec: 120
  recovery:
    branch_ready_sec: 10
    branch_ready_poll_ms: 500
  retries:
    tag_retry_attempts: 3
    tag_retry_delay_ms: 500
  search:
    timeout_sec: 5
  pool:
    max_open: 20
    max_idle: 10
    conn_lifetime_sec: 3600
